name: CI

on:
  push:
    branches: [main]
  pull_request:

# A push supersedes any still-running CI for the same ref: cancel it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# The package requires swift-tools 6.4, which no *released* toolchain ships
# yet — so both lanes run a nightly 6.4 toolchain. The REQUIRED gate is the
# Linux job (its container IS the toolchain, no bootstrap); the macOS lane is
# informational until 6.4 GA.
jobs:
  linux:
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-6.4.x-jammy
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Build (warnings are errors via package settings)
        run: swift build --build-tests
      - name: Tests
        # --no-parallel: the nightly Linux concurrency runtime has crashed
        # under swift-testing's parallel executor; serial is stable.
        run: swift test --no-parallel
      - name: Self-analysis
        run: swift run dolly analyze Sources --strict
      - name: swift-format lint
        run: Scripts/lint-format.sh
      - name: GCD prohibition
        run: Scripts/no-gcd.sh
      - name: Release binary
        run: |
          swift build -c release
          BIN="$(swift build -c release --show-bin-path)/dolly"
          "$BIN" --version
          cp "$BIN" dolly
      - uses: actions/upload-artifact@v4
        with:
          name: dolly-${{ github.sha }}-linux-x86_64
          path: dolly
          retention-days: 14

  macos:
    runs-on: macos-15
    # Informational until 6.4 GA reaches Xcode. Child-spawning steps write to
    # files so no orphan can hold the runner's log pipe and hang post-run.
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Install nightly Swift (swiftly)
        timeout-minutes: 10
        run: |
          curl -fsSL -o swiftly.pkg https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          "$HOME/.swiftly/bin/swiftly" init --assume-yes --skip-install --quiet-shell-followup || true
          "$HOME/.swiftly/bin/swiftly" install main-snapshot --use --assume-yes
          echo "$HOME/.swiftly/bin" >> "$GITHUB_PATH"
      - name: Build & test
        timeout-minutes: 15
        run: |
          set +e
          { swift build --build-tests && swift test --no-parallel; } > build-test.log 2>&1 < /dev/null
          status=$?
          cat build-test.log
          exit $status
      - name: Release binary
        run: |
          set +e
          swift build -c release > release-build.log 2>&1 < /dev/null
          status=$?
          cat release-build.log
          [ $status -ne 0 ] && exit $status
          cp "$(swift build -c release --show-bin-path)/dolly" dolly
      - uses: actions/upload-artifact@v4
        with:
          name: dolly-${{ github.sha }}-macos-arm64
          path: dolly
          retention-days: 14
      - name: Straggler census and reap
        if: always()
        run: |
          echo "toolchain processes still alive:"
          pgrep -fl 'swift-frontend|swift-driver|swift-build|swift-testing|SourceKitService|sourcekit-lsp' || echo "(none)"
          for pattern in swift-frontend swift-driver swift-build swift-package swift-test swift-testing swiftpm-testing-helper xctest SourceKitService sourcekit-lsp; do
            pkill -9 -f "$pattern" 2>/dev/null || true
          done
          exit 0
