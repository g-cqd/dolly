name: Release

# Tag vX.Y.Z (matching ToolInfo.version) → build versioned binaries for both
# platforms, checksum them, and attach everything to a GitHub release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    container: swiftlang/swift:nightly-6.4.x-jammy
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Build, verify version, package
        # Dynamic link + bundled Swift runtime .so files: the binary carries
        # an $ORIGIN rpath, so the archive is self-contained on any
        # glibc-compatible distro (the nightly static-stdlib SDK cannot link).
        run: |
          swift build -c release
          BIN="$(swift build -c release --show-bin-path)/dolly"
          VERSION="$("$BIN" --version)"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "${GITHUB_REF_NAME}" != "${GITHUB_REF}" ] && [ -n "$TAG" ] && [ "$VERSION" != "$TAG" ]; then
            echo "tag v$TAG does not match ToolInfo.version $VERSION" >&2
            exit 1
          fi
          NAME="dolly-$VERSION-linux-x86_64"
          mkdir "$NAME"
          cp "$BIN" LICENSE README.md "$NAME/"
          ldd "$BIN" | awk '$3 ~ /\/usr\/lib\/swift/ {print $3}' | sort -u \
            | xargs -r -I{} cp {} "$NAME/"
          tar -czf "$NAME.tar.gz" "$NAME"
          sha256sum "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            dolly-*.tar.gz
            dolly-*.sha256

  macos:
    runs-on: macos-26
    # continue-on-error so a macOS post-run stall can never block the Linux
    # binary: publish treats this job as satisfied and ships whatever built.
    continue-on-error: true
    # Same stall countermeasures as CI: pipe isolation, step bounds, job bound.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Install Swift 6.4 (vendored dated snapshot)
        timeout-minutes: 10
        uses: ./.github/actions/setup-swift
      - name: Build, verify version, package
        timeout-minutes: 15
        run: |
          set +e
          swift build -c release > build.log 2>&1 < /dev/null
          status=$?
          cat build.log
          [ $status -ne 0 ] && exit $status
          BIN="$(swift build -c release --show-bin-path)/dolly"
          VERSION="$("$BIN" --version)"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "${GITHUB_REF_NAME}" != "${GITHUB_REF}" ] && [ -n "$TAG" ] && [ "$VERSION" != "$TAG" ]; then
            echo "tag v$TAG does not match ToolInfo.version $VERSION" >&2
            exit 1
          fi
          NAME="dolly-$VERSION-macos-arm64"
          mkdir "$NAME"
          cp "$BIN" LICENSE README.md "$NAME/"
          tar -czf "$NAME.tar.gz" "$NAME"
          shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
      - name: Bundle dolly-full (binary + MiniLM embedding model)
        # Best-effort: a model-fetch hiccup must never drop the plain macOS
        # artifact packaged above (this step is continue-on-error, so its
        # failure leaves the plain binary to ship). Ships all-MiniLM-L6-v2
        # (Apache-2.0), converted to Core ML, at Models/MiniLM so
        # `dolly --semantic` uses a real embedding model out of the box —
        # auto-discovered next to the executable, no flag required.
        timeout-minutes: 10
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BIN="$(swift build -c release --show-bin-path)/dolly"
          VERSION="$("$BIN" --version)"
          gh release download embedding-models-v1 --repo "$GITHUB_REPOSITORY" \
            --pattern 'dolly-minilm.tar.gz' --pattern 'dolly-minilm.tar.gz.sha256' --clobber
          EXPECTED="$(cut -d' ' -f1 dolly-minilm.tar.gz.sha256)"
          ACTUAL="$(shasum -a 256 dolly-minilm.tar.gz | cut -d' ' -f1)"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::MiniLM checksum mismatch (expected $EXPECTED, got $ACTUAL)"
            exit 1
          fi
          NAME="dolly-full-$VERSION-macos-arm64"
          mkdir -p "$NAME/Models"
          cp "$BIN" LICENSE README.md "$NAME/"
          tar -xzf dolly-minilm.tar.gz -C "$NAME/Models"   # -> Models/MiniLM/...
          printf '%s\n' \
            '# Bundled model' \
            '' \
            'This archive bundles all-MiniLM-L6-v2 (Models/MiniLM), a sentence-embedding' \
            'model by the Sentence-Transformers authors, converted to Core ML.' \
            '' \
            'Licensed under the Apache License 2.0.' \
            'https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2' \
            '' \
            'dolly loads it automatically for --semantic when it sits next to the' \
            'executable. Delete Models/ to fall back to the on-device NLContextual' \
            'provider, or override with --embedding-bundle / DOLLY_EMBEDDING_BUNDLE.' \
            > "$NAME/THIRD_PARTY_NOTICES.md"
          tar -czf "$NAME.tar.gz" "$NAME"
          shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
          ls -lh "$NAME.tar.gz"
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            dolly-*.tar.gz
            dolly-*.sha256
      - name: Reap toolchain stragglers
        if: always()
        run: |
          pgrep -fl 'swift-frontend|swift-driver|swift-build|leaks' || true
          for pattern in swift-frontend swift-driver swift-build swift-package SourceKitService sourcekit-lsp; do
            pkill -9 -f "$pattern" 2>/dev/null || true
          done
          exit 0

  publish:
    # macOS is continue-on-error, so `needs` treats it as satisfied even if it
    # stalled or failed — publish then ships whatever artifacts exist (Linux
    # always; macOS when it built). A single-platform stall never blocks a
    # release.
    needs: [linux, macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create or update release with whatever binaries built
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dolly-*.tar.gz dolly-*.sha256)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "::error::no release artifacts built on any platform"
            exit 1
          fi
          if ! ls dolly-*-macos-arm64.tar.gz >/dev/null 2>&1; then
            echo "::warning::no macOS artifact — publishing Linux only (macOS lane failed/stalled)"
          fi
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber "${assets[@]}"
          else
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --generate-notes "${assets[@]}"
          fi
